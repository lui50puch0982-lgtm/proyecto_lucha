<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inscripción FBLA 2026</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container" style="padding:0; border:none;">
        <div class="header-fbla">
            <h2 style="color:white; margin:0;">FBLA - REGISTRO</h2>
            <p style="margin:5px 0 0 0; font-size:0.9em;">Nacional Selectivo Santa Cruz 2026</p>
        </div>
        <div class="container" style="margin-top:0; border-radius:0 0 10px 10px;">
            <form action="/inscribir" method="POST">
                <label>Nombre Completo</label>
                <input type="text" name="nombre_completo" required placeholder="Ej: Juan Pérez">

                <label>Cédula de Identidad (CI)</label>
                <input type="text" name="ci" required>

                <label>Asociación Departamental</label>
                <select name="asociacion" required>
                    <option value="" disabled selected>Seleccione su departamento</option>
                    {% for a in asociaciones %}
                    <option value="{{ a }}">{{ a }}</option>
                    {% endfor %}
                </select>

                <div style="display:flex; gap:15px;">
                    <div style="flex:1;">
                        <label>División</label>
                        <select name="division">
                            <option value="Senior">Sénior</option>
                            <option value="U-17">U-17</option>
                        </select>
                    </div>
                    <div style="flex:1;">
                        <label>Género</label>
                        <select name="sexo" id="sexo" onchange="validarEstilo()">
                            <option value="Varones">Varones</option>
                            <option value="Damas">Damas</option>
                        </select>
                    </div>
                </div>

                <label>Estilo</label>
                <select name="estilo" id="estilo">
                    <option value="Libre">Estilo Libre</option>
                    <option value="Greco">Estilo Grecorromano</option>
                </select>

                <label>Peso Actual (Kg)</label>
                <input type="number" step="0.1" name="peso" required placeholder="0.0">

                <div class="info-box">
                    <strong>Convocatoria:</strong> Inscripción Bs. 120. Presentar CI original y fotocopia doble al momento del pesaje.
                </div>

                <button type="submit">ENVIAR REGISTRO</button>
            </form>
        </div>
    </div>

    <script>
        function validarEstilo() {
            const sexo = document.getElementById('sexo').value;
            const estilo = document.getElementById('estilo');
            if (sexo === 'Damas') {
                estilo.value = 'Libre';
                estilo.options[1].disabled = true;
            } else {
                estilo.options[1].disabled = false;
            }
        }
    </script>
</body>
</html>
