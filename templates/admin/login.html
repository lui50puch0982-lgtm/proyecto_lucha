<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBLA - Acceso Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen relative overflow-hidden">
    
    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-gradient-to-br from-indigo-950/90 to-slate-900/95 z-10"></div>
        <img src="https://as1.ftcdn.net/v2/jpg/03/16/89/71/1000_F_316897153_Z5NnOsqWlGZp6aHhXw6nF3rNqI4R9aYQ.jpg" 
     class="absolute inset-0 w-full h-full object-cover" 
     alt="Wrestling Background">
    </div>

    <div class="relative z-20 w-full max-w-md px-6">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border-t-8 border-fbla-red">
            <div class="p-8">
                <div class="text-center mb-10">
                    <h1 class="text-3xl font-black text-indigo-900 italic tracking-tighter">
                        ADMIN <span class="text-red-600">FBLA</span>
                    </h1>
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mt-1">Panel de Control Nacional</p>
                </div>

                {% with messages = get_flashed_messages() %}
                  {% if messages %}
                    {% for message in messages %}
                      <div class="bg-red-50 border-l-4 border-red-500 p-3 mb-6 text-red-700 text-sm font-bold">
                        {{ message }}
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form action="/login" method="POST" class="space-y-6">
                    <div>
                        <label class="block text-xs font-black text-indigo-900 uppercase mb-2">Usuario</label>
                        <input type="text" name="username" required 
                               class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-xl focus:border-red-500 outline-none transition-all font-bold"
                               placeholder="user">
                    </div>

                    <div>
                        <label class="block text-xs font-black text-indigo-900 uppercase mb-2">Contraseña</label>
                        <input type="password" name="password" required 
                               class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-xl focus:border-red-500 outline-none transition-all font-bold"
                               placeholder="••••••••">
                    </div>

                    <button type="submit" 
                            class="w-full bg-indigo-900 hover:bg-indigo-800 text-white font-black py-4 rounded-xl shadow-xl transition duration-200 transform active:scale-95 flex items-center justify-center space-x-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                        </svg>
                        <span>INGRESAR AL SISTEMA</span>
                    </button>
                </form>
            </div>
            
            <div class="bg-gray-50 p-4 text-center">
                <a href="/" class="text-xs font-bold text-gray-400 hover:text-indigo-900 transition uppercase tracking-tighter">
                    ← Volver al Registro de Atletas
                </a>
            </div>
        </div>
    </div>
</body>
</html>
